services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: kilimosmart-api
    runtime: node
    rootDir: server
    buildCommand: npm install && node seed.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://kilimosmart.onrender.com

  # ── Frontend Static Site ─────────────────────────────────────
  - type: static
    name: kilimosmart
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
